# Child Application — Store 001 Bondi Junction
# Generated pattern: one file per store, managed by app-of-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: store-001-bondi
  namespace: argocd
  labels:
    store-id: NSW001
    migration-phase: P3
spec:
  project: woolies-edge-fleet
  source:
    repoURL: https://github.com/niksodavaram/woolies-edge-fleet-ztp
    targetRevision: main
    path: 03-workloads
    plugin:
      name: kustomize-build
  destination:
    server: https://10.101.1.10:6443   # Store 001 OCP API
    namespace: woolies-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: woolies-store-0001-apps
  namespace: argocd
  labels:
    woolies.store/id: "store-0001"
    woolies.store/profile: "v1"
spec:
  project: woolies-edge-fleet

  source:
    repoURL: https://github.com/niksodavaram/infra-enterprise
    targetRevision: main
    path: 02-apps/domains/retail-store-v1
    # optional: helm or kustomize options go here if needed

  destination:
    server: https://kubernetes.default.svc
    namespace: woolies-store-0001

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true