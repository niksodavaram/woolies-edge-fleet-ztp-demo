apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: godog-task
  namespace: tekton-pipelines
spec:
  description: Build and run Godog BDD tests in unit mode.

  params:
    - name: repo-url
      type: string
    - name: revision
      type: string

  workspaces:
    - name: source

  steps:
    - name: clone
      image: golang:1.22
      workingDir: $(workspaces.source.path)
      script: |
        set -eu
        apt-get update && apt-get install -y git
        if [ ! -d repo/.git ]; then
          git clone $(params.repo-url) repo
        fi
        cd repo
        git fetch --all --tags
        git checkout $(params.revision)

    - name: run-godog
      image: golang:1.22
      workingDir: $(workspaces.source.path)/repo/tests/godog
      script: |
        set -eux
        go mod tidy
        go build ./...
        go test ./... -v -tags=unit --godog.format=pretty --godog.tags="~@live"