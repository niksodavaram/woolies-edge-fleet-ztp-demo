# ============================================================
# External Secrets Operator — HashiCorp Vault SecretStore
# All fleet secrets sourced from Vault — nothing in Git
# One SecretStore per store namespace (or cluster-wide)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: woolies-vault
  labels:
    managed-by: argocd
spec:
  provider:
    vault:
      server: "https://vault.woolies.internal:8200"
      path: "secret"
      version: "v2"
      namespace: "woolies"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "woolies-edge-fleet"
          serviceAccountRef:
            name: external-secrets-vault-sa
---
# ExternalSecret — pulls OCP pull secret from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocp-pull-secret
  namespace: woolies-infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: woolies-vault
    kind: ClusterSecretStore
  target:
    name: ocp-pull-secret
    creationPolicy: Owner
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: secret/woolies/ocp/pull-secret
        property: value
---
# ExternalSecret — Dynatrace API token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dynatrace-tokens
  namespace: dynatrace
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: woolies-vault
    kind: ClusterSecretStore
  target:
    name: dynatrace-tokens
    creationPolicy: Owner
  data:
    - secretKey: apiToken
      remoteRef:
        key: secret/woolies/dynatrace/api-token
        property: value
    - secretKey: dataIngestToken
      remoteRef:
        key: secret/woolies/dynatrace/ingest-token
        property: value
