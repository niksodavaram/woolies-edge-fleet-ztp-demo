# ============================================================
# KubeVirt — Windows Checkout App VM
# "The Bridge" — Windows VMs during phased migration
# Runs on OpenShift SNO via KubeVirt operator
# Phase P4: this file is decommissioned once checkout-app
# is containerised and running natively on RHEL/OCP
# ============================================================
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: checkout-app-windows
  namespace: woolies-legacy
  labels:
    app: checkout-app
    platform: windows
    migration-phase: P2   # Still active in P2/P3; removed in P4
    managed-by: argocd
  annotations:
    woolies.com/decommission-target-phase: "P4"
    woolies.com/migration-ticket: "EDGEPLT-4421"
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: checkout-app-windows
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 2
        memory:
          guest: 8Gi
        devices:
          disks:
            - name: windows-disk
              disk:
                bus: virtio
            - name: cloudinitdisk
              cdrom:
                bus: sata
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          tpm: {}                    # Required for Windows 11 TPM
      networks:
        - name: default
          pod: {}
      volumes:
        - name: windows-disk
          persistentVolumeClaim:
            claimName: checkout-app-windows-pvc
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              # Minimal cloud-init for Windows sysprep
              # Full config injected via Ansible WinRM post-boot
