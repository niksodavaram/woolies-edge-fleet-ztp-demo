# .github/workflows/04-infra-tests.yml
name: "04 · Infrastructure Tests"

on:
  pull_request:
    paths:
      - "00-provisioning/**"
      - "01-bootstrap/**"
      - "02-infrastructure/**"
      - "03-workloads/**"
      - "04-secrets-cicd/**"
      - "05-migration/**"
      - "tests/**"
  push:
    branches: [main]

jobs:
  # ── OPA/Conftest policy tests ───────────────────────────────────────────────
  conftest-policy:
    name: "Conftest – OPA Policy Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Convert Kickstart to JSON for conftest
        run: |
          python3 -c "
          import json, pathlib
          ks = pathlib.Path('00-provisioning/kickstart/store-default.ks').read_text()
          print(json.dumps({'content': ks}))
          " > /tmp/kickstart.json

      - name: Test image.toml
        run: |
          conftest test 00-provisioning/image-metadata/image.toml \
            --policy tests/conftest/provisioning \
            --output github

      - name: Test kickstart
        run: |
          conftest test /tmp/kickstart.json \
            --policy tests/conftest/provisioning \
            --output github

      - name: Test infrastructure manifests
        run: |
          conftest test 02-infrastructure/manifests/ \
            --policy tests/conftest/infrastructure \
            --all-namespaces \
            --output github

      - name: Test workload manifests
        run: |
          conftest test 03-workloads/ \
            --policy tests/conftest/workloads \
            --all-namespaces \
            --output github

      - name: Test secrets manifests
        run: |
          conftest test 04-secrets-cicd/external-secrets/ \
            --policy tests/conftest/workloads \
            --output github

  # ── Godog BDD tests ─────────────────────────────────────────────────────────
  godog-bdd:
    name: "Godog – BDD Scenarios (unit mode)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tests/godog/go.sum

      - name: Run BDD step compilation check
        working-directory: tests/godog
        run: go build ./...

      - name: Run dry-run BDD (no live node — tags filter)
        working-directory: tests/godog
        run: |
          go test ./... -v -tags=unit \
            --godog.format=pretty \
            --godog.tags="~@live" 2>&1 | tee godog-results.txt

      - name: Upload BDD results
        uses: actions/upload-artifact@v4
        with:
          name: godog-results
          path: tests/godog/godog-results.txt

  # ── InSpec CIS compliance (against molecule container) ───────────────────────
  inspec-cis:
    name: "InSpec – CIS RHEL9 Compliance"
    runs-on: ubuntu-latest
    container:
      image: chef/inspec:5
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: InSpec syntax check
        run: |
          inspec check tests/inspec/cis-rhel9 --no-backend-cache

      - name: Run InSpec against localhost (molecule container)
        run: |
          inspec exec tests/inspec/cis-rhel9 \
            --target local:// \
            --reporter cli junit:tests/inspec/results.xml \
            --no-backend-cache \
            --controls cis-1.6 woolies \
            || true   # non-zero ok for missing controls on CI container

      - name: Upload InSpec results
        uses: actions/upload-artifact@v4
        with:
          name: inspec-results
          path: tests/inspec/results.xml