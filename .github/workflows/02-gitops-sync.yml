name: 🚀 GitOps Fleet Sync — ArgoCD wave rollout

on:
  push:
    branches: [main]
    paths:
      - "03-workloads/**"
      - "04-secrets-cicd/argo-cd/**"
      - "05-migration/**"
  workflow_dispatch:
    inputs:
      wave_number:
        description: "Wave number to trigger (leave blank for auto)"
        required: false
      target_store:
        description: "Single store ID for targeted sync (e.g. NSW-042)"
        required: false
      dry_run:
        description: "Dry run — plan only, no apply"
        required: false
        type: boolean
        default: true

concurrency:
  group: gitops-fleet-sync
  cancel-in-progress: false   # NEVER cancel a rollout mid-wave

jobs:
  # ── Pre-flight: check fleet health before any sync ──────────────────────────
  pre-flight-checks:
    name: ✅ Pre-flight — fleet health gates
    runs-on: ubuntu-latest
    outputs:
      fleet_healthy: ${{ steps.gates.outputs.healthy }}
      stores_online: ${{ steps.gates.outputs.stores_online }}
      pos_error_rate: ${{ steps.gates.outputs.pos_error_rate }}
    steps:
      - uses: actions/checkout@v6

      - name: Query Thanos fleet health gates
        id: gates
        run: |
          echo "🔍 Checking pre-flight health gates against Thanos..."

          # In production: query actual Thanos endpoint
          # THANOS_URL="http://thanos-query.observability.svc:9090"
          # Simulated for demo:

          STORES_ONLINE=2987
          POS_ERROR_RATE=0.003
          ACM_COMPLIANCE=0.97
          KAFKA_LAG=342

          echo "stores_online=${STORES_ONLINE}" >> $GITHUB_OUTPUT
          echo "pos_error_rate=${POS_ERROR_RATE}" >> $GITHUB_OUTPUT

          # Gate checks
          HEALTHY=true
          [ $(echo "$POS_ERROR_RATE > 0.05" | bc -l) -eq 1 ] && HEALTHY=false && \
            echo "❌ GATE FAIL: POS error rate ${POS_ERROR_RATE} > 5% threshold"
          [ $(echo "$ACM_COMPLIANCE < 0.95" | bc -l) -eq 1 ] && HEALTHY=false && \
            echo "❌ GATE FAIL: ACM compliance ${ACM_COMPLIANCE} < 95% threshold"
          [ $(echo "$KAFKA_LAG > 5000" | bc -l) -eq 1 ] && HEALTHY=false && \
            echo "❌ GATE FAIL: Kafka lag ${KAFKA_LAG} > 5000 threshold"

          echo "healthy=${HEALTHY}" >> $GITHUB_OUTPUT

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🔍 Pre-flight Health Gates
          | Check | Value | Threshold | Result |
          |---|---|---|---|
          | Stores online | ${STORES_ONLINE} | > 2900 | ✅ |
          | POS error rate | ${POS_ERROR_RATE} | < 5% | ✅ |
          | ACM compliance | ${ACM_COMPLIANCE} | > 95% | ✅ |
          | Kafka lag | ${KAFKA_LAG} | < 5000 | ✅ |
          | **Fleet healthy** | | | **${HEALTHY}** |
          EOF

      - name: Abort if fleet unhealthy
        if: steps.gates.outputs.healthy != 'true'
        run: |
          echo "🚫 Fleet health gates FAILED — aborting rollout"
          echo "Fix the failing gates before merging workload changes."
          exit 1

  # ── Diff: what will ArgoCD change? ──────────────────────────────────────────
  argocd-diff:
    name: 📋 ArgoCD diff — what changes
    runs-on: ubuntu-latest
    needs: pre-flight-checks
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show changed manifests
        run: |
          echo "## 📋 Changed manifests in this push" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD -- '*.yaml' '*.yml' '*.json' \
            >> $GITHUB_STEP_SUMMARY || echo "(first commit)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: ArgoCD diff (simulated)
        run: |
          echo "🔍 ArgoCD would show diff for affected store Applications..."
          echo "In production:"
          echo "  argocd app diff woolies-fleet-root --server \$ARGOCD_SERVER"
          echo "  argocd app diff store-NSW-042 --server \$ARGOCD_SERVER"

  # ── Sync: trigger ArgoCD fleet sync ─────────────────────────────────────────
  argocd-sync:
    name: 🔄 ArgoCD sync — fleet rollout
    runs-on: ubuntu-latest
    needs: [pre-flight-checks, argocd-diff]
    if: |
      needs.pre-flight-checks.outputs.fleet_healthy == 'true' &&
      github.event.inputs.dry_run != 'true'
    environment: fleet-sync   # requires manual approval for production fleet
    steps:
      - uses: actions/checkout@v6

      - name: Determine sync scope
        id: scope
        run: |
          if [ -n "${{ github.event.inputs.target_store }}" ]; then
            echo "scope=single" >> $GITHUB_OUTPUT
            echo "target=store-${{ github.event.inputs.target_store }}" >> $GITHUB_OUTPUT
            echo "🎯 Targeted sync: store-${{ github.event.inputs.target_store }}"
          else
            echo "scope=fleet" >> $GITHUB_OUTPUT
            echo "target=woolies-fleet-root" >> $GITHUB_OUTPUT
            echo "🌐 Fleet sync: all stores in current wave"
          fi

      - name: Sync ArgoCD application
        run: |
          echo "🚀 Syncing ArgoCD application: ${{ steps.scope.outputs.target }}"
          echo "In production:"
          echo "  argocd app sync ${{ steps.scope.outputs.target }} \\"
          echo "    --server \$ARGOCD_SERVER \\"
          echo "    --auth-token \$ARGOCD_AUTH_TOKEN \\"
          echo "    --timeout 300 \\"
          echo "    --retry-limit 3"

      - name: Wait for sync health
        run: |
          echo "⏳ Waiting for ArgoCD sync to complete..."
          echo "In production:"
          echo "  argocd app wait ${{ steps.scope.outputs.target }} \\"
          echo "    --health --timeout 600"
          echo ""
          echo "✅ Sync complete (simulated)"

      - name: Post sync summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 ArgoCD Sync Summary
          | Field | Value |
          |---|---|
          | Scope | ${{ steps.scope.outputs.scope }} |
          | Target | \`${{ steps.scope.outputs.target }}\` |
          | Fleet health (pre-flight) | ✅ ${stores_online} stores online |
          | Triggered by | ${{ github.actor }} |
          | Commit | \`${{ github.sha }}\` |
          EOF

  # ── Post-sync: verify health after deployment ────────────────────────────────
  post-sync-verification:
    name: 🩺 Post-sync health check
    runs-on: ubuntu-latest
    needs: argocd-sync
    steps:
      - name: Check fleet health post-sync
        run: |
          echo "🩺 Post-sync health check..."
          echo "Verifying:"
          echo "  - All synced stores show ArgoCD status: Synced + Healthy"
          echo "  - POS error rate unchanged"
          echo "  - No new Alertmanager alerts"
          echo "  - Kafka consumer lag stable"
          echo ""
          echo "✅ Post-sync verification passed (simulated)"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🔄 POST-SYNC HEALTH CHECK FAILED — triggering rollback"
          echo "In production:"
          echo "  argocd app rollback ${{ needs.argocd-sync.outputs.target }} --server \$ARGOCD_SERVER"
          echo ""
          echo "ostree rollback also available per store:"
          echo "  oc exec -n store-platform deploy/store-agent -- ostree admin rollback"
