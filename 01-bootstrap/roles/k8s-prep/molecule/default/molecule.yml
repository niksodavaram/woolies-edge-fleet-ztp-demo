# 01-bootstrap/roles/k8s-prep/molecule/default/molecule.yml
---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker

platforms:
  - name: woolies-k8s-prep-rhel9
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
      - /var/run
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    capabilities:
      - SYS_ADMIN
    privileged: false
    env:
      container: docker
      KUBECONFIG: /var/lib/microshift/resources/kubeadmin/kubeconfig

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      woolies-k8s-prep-rhel9:
        microshift_version: "4.17"
        disconnected_registry: "registry.woolies.internal"
        pull_secret_vault_path: "secret/woolies/store/pull-secret"
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default

lint: |
  set -e
  yamllint .
  ansible-lint .