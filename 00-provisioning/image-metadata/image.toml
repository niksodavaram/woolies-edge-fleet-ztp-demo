# RHEL Image Builder blueprint — Woolworths store edge node
# Used by: 00-provisioning/packer/rhel9-edge.pkr.hcl (CI) or direct osbuild-composer
# Tracks: migration phase, store tier, KubeVirt bridge flag
# See: docs/adrs/ADR-001-sno-vs-microshift.md

# Migration metadata — read by MCP agents and ArgoCD wave gates
#
# Design note: I tracked 3,000 bird tags across 16 remote stations
# (CCG Technologies, 2008-14). A firmware update that deleted the old
# image before verifying the new one caused permanent tag loss when a
# bird flew out of range mid-update. The kubevirt_bridge flag here
# serves the same purpose as A/B boot on the bird tags: the old
# Windows VM stays running (kubevirt_bridge=true) until the new
# RHEL workload has been trading for 48 clean hours. Only then do
# we decommission it. Never delete the old until the new is proven.

name        = "woolies-store-edge"
description = "Immutable RHEL 9 for Edge — WooliesX store node (ostree / image mode)"
version     = "1.3.0"
distro      = "rhel-9"

# ── Packages ─────────────────────────────────────────────────────────────────
[packages]
  include = [
    # MicroShift core
    "microshift",
    "microshift-selinux",
    "microshift-networking",
    "microshift-greenboot",

    # Observability agents
    "prometheus-node-exporter",
    "promtail",

    # Security + compliance
    "aide",
    "auditd",
    "openscap-scanner",
    "scap-security-guide",

    # Network tooling
    "NetworkManager",
    "nmstate",
    "openvswitch",

    # Operational
    "podman",
    "skopeo",
    "jq",
    "python3",
    "python3-pip",
  ]

  exclude = [
    "telnet",
    "rsh",
    "ypbind",
    "ypserv",
    "tftp",
    "talk",
    "cups",
    "bluetooth",
    "avahi-daemon",
    "xinetd",
  ]

# ── Kernel ───────────────────────────────────────────────────────────────────
[customizations.kernel]
  name   = "kernel"
  append = "console=ttyS0,115200 rd.luks.options=discard selinux=1 enforcing=1 audit=1 ipv6.disable=0"

# ── Filesystem (CIS-partitioned) ─────────────────────────────────────────────
[[customizations.filesystem]]
  mountpoint = "/"
  minsize    = 10737418240  # 10 GB

[[customizations.filesystem]]
  mountpoint = "/var"
  minsize    = 21474836480  # 20 GB — MicroShift writes here

[[customizations.filesystem]]
  mountpoint = "/var/lib/microshift"
  minsize    = 10737418240  # 10 GB

[[customizations.filesystem]]
  mountpoint = "/tmp"
  minsize    = 1073741824   # 1 GB — noexec via fstab options

[[customizations.filesystem]]
  mountpoint = "/home"
  minsize    = 1073741824

# ── Services ─────────────────────────────────────────────────────────────────
[customizations.services]
  enabled  = [
    "microshift",
    "greenboot-healthcheck",
    "promtail",
    "node_exporter",
    "auditd",
    "aide",
  ]
  disabled = [
    "bluetooth",
    "cups",
    "avahi-daemon",
    "postfix",
    "rpcbind",
  ]

# ── Firewall ─────────────────────────────────────────────────────────────────
[customizations.firewall]
  [customizations.firewall.services]
    enabled  = ["ssh", "https"]
    disabled = ["telnet", "ftp", "rsh"]

  [[customizations.firewall.ports]]
    port     = "6443"   # OCP / MicroShift API server
    protocol = "tcp"

  [[customizations.firewall.ports]]
    port     = "1883"   # MQTT broker (cold chain IoT)
    protocol = "tcp"

  [[customizations.firewall.ports]]
    port     = "9090"   # Prometheus node exporter
    protocol = "tcp"

# ── Ansible service account ──────────────────────────────────────────────────
[[customizations.user]]
  name   = "ansible-svc"
  groups = ["wheel"]
  key    = "ssh-ed25519 AAAA_REPLACE_WITH_FLEET_KEY ansible-fleet@woolies"

# ── Image content sources (internal mirror — disconnected-safe) ──────────────
[[customizations.imageContentSources]]
  mirrors = ["registry.woolies.internal:5000/openshift"]
  source  = "quay.io/openshift"

[[customizations.imageContentSources]]
  mirrors = ["registry.woolies.internal:5000/ubi9"]
  source  = "registry.access.redhat.com/ubi9"

# ── Woolworths migration metadata ────────────────────────────────────────────
# These fields are read by MCP agents and ArgoCD wave gates to control rollout
# Do not remove — platform-ai/rollout-controller depends on these values

[woolies.migration]
  current_phase   = "P1"              # P0 | P1 | P2 | P3 | P4
  source_platform = "windows-vmware"
  target_platform = "rhel9-microshift"
  kubevirt_bridge = true              # true = SNO large store | false = MicroShift

[woolies.store]
  tier     = "supermarket"            # supermarket | metro | liquor
  state    = "NSW"
  region   = "sydney-west"
  store_id = "NSW-042"               # overridden per store via Kickstart %post

[woolies.image]
  version    = "1.3.0"
  built_at   = "2025-04-07T00:00:00Z"
  ci_run     = "github-actions-run-id-REPLACE"
  cis_level  = "level2"
  oscap_pass = true
